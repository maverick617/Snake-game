<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="header">
          <div>
            <p class="eyebrow">Classic Mode</p>
            <h1>Snake</h1>
          </div>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <div class="status">
          <p>Score: <span id="score">0</span></p>
          <p id="message">Use arrow keys or WASD to start.</p>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <div class="controls" aria-label="On-screen controls">
          <button class="control up" type="button" data-direction="up">Up</button>
          <button class="control left" type="button" data-direction="left">Left</button>
          <button class="control down" type="button" data-direction="down">Down</button>
          <button class="control right" type="button" data-direction="right">Right</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
